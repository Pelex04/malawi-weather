# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Primary database: Neon PostgreSQL ─────────────────────────────────────────
# Set DATABASE_URL as env var — never hardcode credentials
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver

# Neon compute-suspension resilience
# Neon pauses on inactivity; the first connection after wake-up times out.
# These settings retry that first connection automatically.
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.initialization-fail-timeout=0
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.max-lifetime=300000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.idle-timeout=120000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── Fallback database: SQLite (local, zero-config) ────────────────────────────
# If DATABASE_URL is unavailable, the app falls back to an embedded SQLite file.
# WeatherCache reads/writes will still work; developer/key data won't be available
# until Neon wakes up. Set DATABASE_URL to re-engage the primary automatically.
fallback.datasource.enabled=${FALLBACK_DB_ENABLED:false}
fallback.datasource.path=${FALLBACK_DB_PATH:./mvula-fallback.db}

# ── Weather data sources ──────────────────────────────────────────────────────
# PRIMARY — Open-Meteo (free, no key, high quality ECMWF model)
openmeteo.base-url=https://api.open-meteo.com/v1/forecast
openmeteo.enabled=true

# SECONDARY — WeatherAPI.com (1M calls/month free, requires key)
weatherapi.base-url=https://api.weatherapi.com/v1
weatherapi.key=${WEATHERAPI_KEY:}
weatherapi.enabled=${WEATHERAPI_ENABLED:false}

# TERTIARY — Open-Meteo mirror (community instance — different host, same API)
openmeteo.mirror-url=https://api.open-meteo.com/v1/forecast
openmeteo.mirror-enabled=false

# Source selection strategy: OPEN_METEO_FIRST | WEATHERAPI_FIRST | ROUND_ROBIN
weather.source.strategy=${WEATHER_SOURCE_STRATEGY:OPEN_METEO_FIRST}

# ── Cache TTLs ─────────────────────────────────────────────────────────────────
cache.current-weather.ttl-minutes=30
cache.forecast.ttl-minutes=180

# ── Admin credentials ─────────────────────────────────────────────────────────
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── App ───────────────────────────────────────────────────────────────────────
spring.application.name=malawi-weather-api
