# Server
server.port=${PORT:8080}

# Database - Neon PostgreSQL
# Set DATABASE_URL as an environment variable — never hardcode credentials
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# Open-Meteo base URL (free, no key needed)
openmeteo.base-url=https://api.open-meteo.com/v1/forecast

# Cache TTL in minutes
cache.weather.ttl=30

# Admin credentials — REQUIRED. No fallback defaults.
# Set ADMIN_USERNAME and ADMIN_PASSWORD as environment variables.
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# CORS — comma-separated list of allowed frontend origins
# Example: https://mvula.dev,https://www.mvula.dev
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# App info
spring.application.name=malawi-weather-api
