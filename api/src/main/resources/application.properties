# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database: Supabase PostgreSQL (via Supavisor connection pooler) ───────────
# Use the POOLER url (port 6543) not the direct host (port 5432).
# Render free tier is IPv6-only; Supabase direct host is IPv4-only.
# The Supavisor pooler at aws-0-eu-west-1.pooler.supabase.com supports both.
#
# Set these env vars on Render:
#   DATABASE_URL=jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require&user=postgres.mfzjtpswuofmnxuwwzds&password=YOUR_PASSWORD
#   SPRING_DATASOURCE_USERNAME=postgres.mfzjtpswuofmnxuwwzds
#   SPRING_DATASOURCE_PASSWORD=YOUR_PASSWORD
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — tuned for Supabase Supavisor pooler
# Supavisor is always available (no suspend/resume like Neon).
# Keep pool small — Supabase free tier allows max 20 direct connections.
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# ── Weather data sources ──────────────────────────────────────────────────────
openmeteo.base-url=https://api.open-meteo.com/v1/forecast
openmeteo.enabled=true

weatherapi.base-url=https://api.weatherapi.com/v1
weatherapi.key=${WEATHERAPI_KEY:}
weatherapi.enabled=${WEATHERAPI_ENABLED:false}

weather.source.strategy=${WEATHER_SOURCE_STRATEGY:OPEN_METEO_FIRST}

# ── Cache TTLs ────────────────────────────────────────────────────────────────
cache.current-weather.ttl-minutes=30
cache.forecast.ttl-minutes=180

# ── Admin credentials ─────────────────────────────────────────────────────────
admin.username=${ADMIN_USERNAME}
admin.password=${ADMIN_PASSWORD}

# ── CORS ──────────────────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── App ───────────────────────────────────────────────────────────────────────
spring.application.name=malawi-weather-api
